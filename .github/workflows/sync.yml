name: Split Master Calendar Channels

on:
  push:
    paths:
      - 'blocked-dates.json'
  workflow_dispatch:

jobs:
  generate-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Process and Separate iCal Channels
        run: |
          python3 -c '
          import json
          from datetime import datetime

          try:
              with open("blocked-dates.json", "r") as f:
                  data = json.load(f)
          except Exception:
              data = []

          def generate_ics(events, filename):
              ics = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Bungalow Manager//EN"]
              for i, e in enumerate(events):
                  # Format dates cleanly for the iCal standard
                  s = e["start"].replace("-", "")
                  d = e["end"].replace("-", "")
                  ics.append("BEGIN:VEVENT")
                  ics.append(f"UID:{s}-{i}@bungalowmanager")
                  ics.append(f"DTSTART;VALUE=DATE:{s}")
                  ics.append(f"DTEND;VALUE=DATE:{d}")
                  ics.append(f"SUMMARY:{e['title']}")
                  ics.append("END:VEVENT")
              ics.append("END:VCALENDAR")
              
              with open(filename, "w") as f:
                  f.write("\n".join(ics))

          # Filter data segments using the UI CSS class names
          generate_ics([e for e in data if e.get("className") == "room-2"], "room2.ics")
          generate_ics([e for e in data if e.get("className") == "room-3"], "room3.ics")
          generate_ics([e for e in data if e.get("className") == "room-4"], "room4.ics")
          generate_ics([e for e in data if e.get("className") == "room-full"], "bungalow.ics")
          '

      - name: Commit and Push Clean Channels
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add room2.ics room3.ics room4.ics bungalow.ics
          git diff --cached --quiet || git commit -m "Auto-split channel feeds [skip ci]"
          git push
