name: Split Master Calendar Channels

on:
  push:
    paths:
      - 'blocked-dates.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Process and Separate iCal Channels
        run: |
          # Write the code out into a clean file first to avoid terminal quote clashes completely
          cat << 'EOF' > split_cal.py
          import json

          try:
              with open("blocked-dates.json", "r") as f:
                  data = json.load(f)
          except Exception:
              data = []

          def generate_ics(events, filename):
              ics = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Bungalow Manager//EN"]
              for i, e in enumerate(events):
                  s = e["start"].replace("-", "")
                  d = e["end"].replace("-", "")
                  ics.append("BEGIN:VEVENT")
                  ics.append(f"UID:{s}-{i}@bungalowmanager")
                  ics.append(f"DTSTART;VALUE=DATE:{s}")
                  ics.append(f"DTEND;VALUE=DATE:{d}")
                  ics.append(f"SUMMARY:{e.get('title', 'Blocked Slot')}")
                  ics.append("END:VEVENT")
              ics.append("END:VCALENDAR")
              
              with open(filename, "w") as f:
                  f.write("\n".join(ics))

          def is_room(event, room_num):
              title = event.get("title", "")
              c_name = str(event.get("className", ""))
              return f"Room {room_num}" in title or f"Rm {room_num}" in title or f"room-{room_num}" in c_name

          def is_full(event):
              title = event.get("title", "")
              c_name = str(event.get("className", ""))
              return "Full" in title or "room-full" in c_name

          generate_ics([e for e in data if is_room(e, 2)], "room2.ics")
          generate_ics([e for e in data if is_room(e, 3)], "room3.ics")
          generate_ics([e for e in data if is_room(e, 4)], "room4.ics")
          generate_ics([e for e in data if is_full(e)], "bungalow.ics")
          EOF
          
          # Run the clean script file
          python3 split_cal.py

      - name: Commit and Push Clean Channels
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add room2.ics room3.ics room4.ics bungalow.ics
          git diff --cached --quiet || git commit -m "Auto-split channel feeds [skip ci]"
          git push
