name: Global Synchronization Pipeline
on:
  push:
    paths:
      - 'blocked-dates.json'
  schedule:
    - cron: '*/30 * * * *' # Backup polling loop every 30 mins

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Runtime Dependencies
        run: |
          npm install ical-generator playwright
          npx playwright install chromium --with-deps

      - name: Generate Global iCal File
        run: |
          node -e "
          const fs = require('fs');
          const ical = require('ical-generator').default;
          const data = JSON.parse(fs.readFileSync('blocked-dates.json', 'utf8'));
          const cal = ical({ name: 'Master Channel Feed' });
          data.forEach(ev => {
            cal.createEvent({ start: ev.start, end: ev.end, summary: ev.title, allDay: true });
          });
          fs.writeFileSync('calendar.ics', cal.toString());
          "

      - name: Host updated iCal on GitHub Pages
        run: |
          git config --global user.name "Automation Pipeline"
          git config --global user.email "bot@github.com"
          git add calendar.ics
          git diff-index --quiet HEAD || git commit -m "Generated distribution iCal feed [skip ci]" && git push || true

      - name: Run MakeMyTrip Browser Automation Block
        env:
          MMT_USER: ${{ secrets.MMT_USER }}
          MMT_PASS: ${{ secrets.MMT_PASS }}
        run: |
          node -e "
          const { chromium } = require('playwright');
          const fs = require('fs');
          
          async function execute() {
            const data = JSON.parse(fs.readFileSync('blocked-dates.json', 'utf8'));
            if(data.length === 0) return;
            
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            
            console.log('Logging into InGoMMT...');
            await page.goto('https://partners.go-mmt.com/');
            await page.fill('input[name=\"username\"]', process.env.MMT_USER);
            await page.fill('input[name=\"password\"]', process.env.MMT_PASS);
            await page.click('button[type=\"submit\"]');
            await page.waitForNavigation();
            
            // Loop updates across recent targets
            for(let block of data) {
               console.log('Blocking dates on MMT:', block.start, 'to', block.end);
               // Add tailored selector inputs matching your MMT portal layout here...
            }
            await browser.close();
          }
          execute().catch(err => { console.error(err); process.exit(1); });
          "
