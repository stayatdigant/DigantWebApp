<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Added viewport-fit=cover for modern notched phones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bungalow Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f4f6f8;
      --card-bg: white;
      --text-main: #333;
      --primary: #007bff;
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      margin: 20px; 
      background: var(--bg-color); 
      color: var(--text-main);
      -webkit-tap-highlight-color: transparent; /* Removes blue tap flash on mobile */
    }
    
    .container { 
      max-width: 950px; 
      margin: 0 auto; 
      background: var(--card-bg); 
      padding: 20px; 
      border-radius: 16px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
    }
    
    .config-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
    
    /* Improved Touch Targets for Mobile (Minimum 44px height) */
    input, select, button { 
      padding: 12px; 
      border: 1px solid #ddd; 
      border-radius: 8px; 
      font-size: 16px; /* Prevents auto-zoom on iPhones */
      min-height: 44px;
    }
    input { flex-grow: 1; }
    select { background-color: white; font-weight: 500; }
    
    button { 
      background: var(--primary); 
      color: white; 
      border: none; 
      cursor: pointer; 
      font-weight: 600; 
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }
    
    /* Room Color Schemes */
    .room-2 { background-color: #3498db !important; border-color: #2980b9 !important; }
    .room-3 { background-color: #9b59b6 !important; border-color: #8e44ad !important; }
    .room-4 { background-color: #e67e22 !important; border-color: #d35400 !important; }
    .room-full { background-color: #e74c3c !important; border-color: #c0392b !important; }
    
    .fc-event { 
      font-weight: 600; 
      color: white !important; 
      padding: 2px 4px; 
      border-radius: 4px; 
      font-size: 11px;
      border: none !important;
    }

    /* Modal Backdrop */
    .modal-backdrop { 
      display: none; 
      position: fixed; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      background: rgba(0,0,0,0.4); 
      backdrop-filter: blur(2px);
      z-index: 9999; 
      justify-content: center; 
      align-items: center; 
    }

    /* Desktop Modal Style */
    .modal-content { 
      background: white; 
      padding: 24px; 
      border-radius: 16px; 
      width: 90%; 
      max-width: 400px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
      box-sizing: border-box;
    }
    .modal-content h3 { margin: 0 0 5px 0; font-size: 20px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
    .btn-cancel { background: #f1f3f5; color: #495057; }

    /* =========================================
       MOBILE-SPECIFIC OVERRIDES
       ========================================= */
    @media (max-width: 600px) {
      body { margin: 0; background: var(--card-bg); }
      .container { padding: 10px; border-radius: 0; box-shadow: none; }
      
      h2 { font-size: 1.5rem; margin-top: 10px; }
      
      /* Reorganize Calendar Header for narrow screens */
      .fc .fc-toolbar { flex-direction: column; gap: 12px; }
      .fc .fc-toolbar-title { font-size: 1.25em !important; }
      
      /* Make day numbers slightly smaller */
      .fc .fc-daygrid-day-number { font-size: 14px; padding: 4px !important; }

      /* Convert Modal to a Native-feeling Bottom Sheet */
      .modal-backdrop { align-items: flex-end; }
      .modal-content {
        width: 100%;
        max-width: 100%;
        border-radius: 24px 24px 0 0;
        padding: 24px 24px 40px 24px; /* Extra bottom padding for home-bar */
        animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .modal-actions { flex-direction: column-reverse; } /* Stack buttons on mobile */
      .modal-actions button { width: 100%; height: 50px; font-size: 16px; }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <h2 style="text-align: center;">Bungalow Manager</h2>
  
  <div class="config-bar" id="configBar">
    <input type="password" id="gh-token" placeholder="Paste GitHub Token here">
    <button onclick="saveToken()">Save</button>
  </div>

  <div id="calendar"></div>
</div>

<!-- Mobile Friendly Bottom-Sheet Modal -->
<div id="bookingModal" class="modal-backdrop">
  <div class="modal-content">
    <h3>Block Dates</h3>
    <p id="modalDateRange" style="color: #666; margin-bottom: 20px; font-weight: 500; font-size: 14px;"></p>
    
    <label for="roomSelect" style="display: block; margin-bottom: 10px; font-weight: 600; color: #444;">Select Property Option:</label>
    <select id="roomSelect" style="width: 100%; box-sizing: border-box; margin-bottom: 10px;">
      <option value="Room 2">Room 2</option>
      <option value="Room 3">Room 3</option>
      <option value="Room 4">Room 4</option>
      <option value="Full Bungalow">Full Bungalow</option>
    </select>
    
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button onclick="confirmBlock()">Confirm Block</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
  // ⚠️ UPDATE THESE VALUES AGAIN
  const GH_OWNER = 'stayatdigant';
  const GH_REPO = 'DigantWebApp';
  const FILE_PATH = 'blocked-dates.json';

  let calendar;
  let currentSha = '';
  let blockedEvents = [];
  let selectedInfo = null;

  document.addEventListener('DOMContentLoaded', async function() {
    const savedToken = localStorage.getItem('gh_token');
    document.getElementById('gh-token').value = savedToken || '';
    
    // Auto-hide the config bar if the token is already saved for a cleaner UI
    if(savedToken) {
      document.getElementById('configBar').style.display = 'none';
    }

    await loadInitialData();
    initCalendar();
  });

  function saveToken() {
    localStorage.setItem('gh_token', document.getElementById('gh-token').value);
    alert('Config token saved successfully!');
    location.reload();
  }

  async function loadInitialData() {
    try {
      const cacheBuster = new Date().getTime();
      const response = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${FILE_PATH}?t=${cacheBuster}`);
      if (response.ok) {
        const data = await response.json();
        currentSha = data.sha;
        blockedEvents = JSON.parse(atob(data.content));
      }
    } catch (e) {
      console.log("Starting fresh database entry layout.");
    }
  }

  function initCalendar() {
    const calendarEl = document.getElementById('calendar');
    calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      selectable: true,
      selectLongPressDelay: 0,
      contentHeight: 'auto', // Prevents internal scrolling on mobile
      events: blockedEvents,
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: ''
      },
      select: function(info) {
        selectedInfo = info;
        document.getElementById('modalDateRange').innerText = `${info.startStr} to ${info.endStr}`;
        document.getElementById('bookingModal').style.display = 'flex';
      },
      eventClick: async function(info) {
        if (confirm(`Remove block for "${info.event.title}" on this date range?`)) {
          const startStr = info.event.startStr;
          const endStr = info.event.endStr;
          
          blockedEvents = blockedEvents.filter(e => !(e.start === startStr && e.end === endStr));
          
          await pushToGitHub(blockedEvents);
          location.reload(); 
        }
      }
    });
    calendar.render();
  }

  function closeModal() {
    document.getElementById('bookingModal').style.display = 'none';
    calendar.unselect();
  }

  function getClassName(title) {
    if (title.includes("Room 2")) return "room-2";
    if (title.includes("Room 3")) return "room-3";
    if (title.includes("Room 4")) return "room-4";
    return "room-full";
  }

  async function confirmBlock() {
    const selectedRoom = document.getElementById('roomSelect').value;
    const start = selectedInfo.startStr;
    const end = selectedInfo.endStr;
    
    let newBlocks = [];

    // Abbreviated titles so they fit perfectly on a phone screen
    if (selectedRoom === "Full Bungalow") {
      newBlocks = [
        { title: "Full Bungalow", start, end, allDay: true, className: "room-full" },
        { title: "Rm 2 (Locked)", start, end, allDay: true, className: "room-2" },
        { title: "Rm 3 (Locked)", start, end, allDay: true, className: "room-3" },
        { title: "Rm 4 (Locked)", start, end, allDay: true, className: "room-4" }
      ];
    } else {
      const shortRoom = selectedRoom.replace('Room', 'Rm');
      newBlocks = [
        { title: selectedRoom, start, end, allDay: true, className: getClassName(selectedRoom) },
        { title: `Full (${shortRoom})`, start, end, allDay: true, className: "room-full" }
      ];
    }

    blockedEvents.push(...newBlocks);
    
    closeModal();
    await pushToGitHub(blockedEvents);
    location.reload(); 
  }

  async function pushToGitHub(dataObject) {
    const token = localStorage.getItem('gh_token');
    if (!token) return alert('Please save your GitHub token first!');

    try {
      const cacheBuster = new Date().getTime();
      const latestRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${FILE_PATH}?t=${cacheBuster}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      if (latestRes.ok) {
        const latestData = await latestRes.json();
        currentSha = latestData.sha;
      }
    } catch (err) {
      console.error("SHA Sync Failure:", err);
    }

    const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(dataObject, null, 2))));
    const payload = {
      message: "Calendar channels auto-aligned via master UI",
      content: contentBase64,
      sha: currentSha || undefined
    };

    const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${FILE_PATH}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      alert('Error saving data. Double check token permissions.');
    }
  }
</script>
</body>
</html>
